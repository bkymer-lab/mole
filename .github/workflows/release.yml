name: Build and Release Mac App

on:
  push:
    tags:
      - 'v*' # Trigger on tags starting with v (e.g. v1.0.0)

jobs:
  build_release:
    runs-on: macos-14 # Ensure we use an environment compatible with the macOS 14.0 target
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.10" # Use recent Swift version compatible with features
          
      - name: Make Build Script Executable
        run: chmod +x Scripts/build_release_dmg.sh
        
      - name: Build and Package App (DMG)
        run: ./Scripts/build_release_dmg.sh
        
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: Mole_Premium.dmg
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
